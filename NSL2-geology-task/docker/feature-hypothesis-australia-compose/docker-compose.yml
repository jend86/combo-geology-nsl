services:
  agent:
    build:
      context: ../..
      dockerfile: docker/feature-hypothesis-australia-compose/Dockerfile.agent
    restart: unless-stopped
    tty: true
    stdin_open: true
    networks: [agent-net]
    command: ["sh", "-c", "tail -f /dev/null"]

  vfm:
    build:
      # Context is combo-geology-nsl root (not NSL2-geology-task) so the
      # Dockerfile can COPY voxel-features-mcp/voxel_features, which lives
      # as a sibling of NSL2-geology-task. See Dockerfile.vfm.
      context: ../../..
      dockerfile: NSL2-geology-task/docker/feature-hypothesis-australia-compose/Dockerfile.vfm
    restart: unless-stopped
    tty: true
    stdin_open: true
    networks: [task-net]
    environment:
      - PYTHONPATH=/opt/vfm
      - VFM_STORE_PATH=/workspace/store
      - VFM_KG_PATH=/workspace/knowledge
    volumes:
      - ${FEATURE_STORE_DIR:-../../data/australia/feature-hypothesis/store}:/workspace/store:rw
      - ${FEATURE_KG_DIR:-../../data/australia/feature-hypothesis/knowledge}:/workspace/knowledge:rw
    tmpfs:
      - /workspace/tmp:rw,size=1g
    command: ["sh", "-c", "tail -f /dev/null"]

  analysis:
    build:
      context: ../..
      dockerfile: docker/feature-hypothesis-australia-compose/Dockerfile.analysis
    restart: unless-stopped
    tty: true
    stdin_open: true
    networks: [task-net]
    volumes:
      # Resolved relative to this compose file
      # (docker/feature-hypothesis-australia-compose/): three `..`s walk up
      # to the repo root, where Australian_data lives as a sibling of
      # NSL2-geology-task.
      - ${AUSTRALIAN_DATA_DIR:-../../../Australian_data}:/workspace/input:ro
      # Report-verified data corrections (2026-06-11), overlaid ON TOP of the
      # read-only dataset so the ORIGINAL ../Australian_data stays pristine.
      # File-level binds shadow just these two files (deeper dest path wins).
      # See docs/design/australia-data-quality-audit-2026-06-11.md:
      #   - geochemSurface au_ppm: 16 corrupt -5556 sentinels -> null
      #   - geochemDrillhole au_ppm: 10 anumber-88396 "10LARC" holes ÷1000
      #     (ppb mislabeled as ppm; the WAMEX report "Grade (g/t Au)" confirms)
      - ./data-overlays/amalgamated_csvs/geochemDrillhole.csv:/workspace/input/amalgamated_csvs/geochemDrillhole.csv:ro
      - ./data-overlays/amalgamated_csvs/geochemSurface.csv:/workspace/input/amalgamated_csvs/geochemSurface.csv:ro
      # Non-gold source patch (non-gold.zip, 2026-06-23). The 20 reports it
      # touches already exist; 1081/1132 of its files only rewrote the JSON
      # `source` prefix to a `non-gold/...` label the task never reads
      # (provenance, not a path) — those inert relabels are DROPPED. Only the
      # genuinely-different files are kept, with the provenance `source` segment
      # STRIPPED (dataset-wide, via scripts/strip_chunk_source.py — drops the
      # `non-gold/` label with it). Split into:
      #   * 37 CORRECTIONS shadowed below (12 OCR content fixes + 8 repairs of
      #     malformed-JSON `\escape` chunks live in the dataset + 17 regenerated
      #     figure .description.md). Original ../Australian_data stays pristine.
      #   * 12 brand-new files (assay/surface .txt, a .jpg, new .description.md)
      #     CANNOT be file-bound under a read-only mount, so they are staged in
      #     data-overlays/_dataset_additions/ for manual placement into the
      #     dataset — see data-overlays/DATASET_ADDITIONS.md.
      # Re-derive: scripts/build_nongold_overlay.py. Design doc:
      # docs/design/australia-non-gold-overlay-2026-06-24.md
      - ./data-overlays/E_20_tenement_A_bundle/wamex_downloads_E20_tenement_A/10996/a10996_a010996_pdf_(OCR)_chunk_139.json:/workspace/input/E_20_tenement_A_bundle/wamex_downloads_E20_tenement_A/10996/a10996_a010996_pdf_(OCR)_chunk_139.json:ro
      - ./data-overlays/E_20_tenement_A_bundle/wamex_downloads_E20_tenement_A/10996/a10996_a010996_pdf_(OCR)_chunk_143.json:/workspace/input/E_20_tenement_A_bundle/wamex_downloads_E20_tenement_A/10996/a10996_a010996_pdf_(OCR)_chunk_143.json:ro
