      - ./data-overlays/E_20_tenement_A_bundle/wamex_downloads_E20_tenement_A/10996/a10996_a010996_pdf_(OCR)_chunk_161.json:/workspace/input/E_20_tenement_A_bundle/wamex_downloads_E20_tenement_A/10996/a10996_a010996_pdf_(OCR)_chunk_161.json:ro
