# FULLY-EXTERNAL variant of config-feature-hypothesis-kazakhstan-dual.toml.
#
# The local 2x4090 box is now DEDICATED TO FINETUNING (standalone SFT on the pooled
# dataset, see scripts -m src.train.qlora), so ALL inference moves to external pods.
# No local vLLM is launched: endpoints-mode (the [[vllm.endpoints]] list below) makes
# the framework connect to + probe the URLs only. Topology:
#   - runpod-h100-1 : one H100 80GB PCIe (Hopper) vLLM, v0.20.2, fp8 KV (Hopper supports
#                     e4m3 natively, unlike the Ampere A40), TP1/PP1, max_model_len 65536,
#                     max-num-seqs 32, --enforce-eager. ~26 fp8 KV slots; started at 18.
#   - runpod-a40-1  : the existing A40 48GB pod kept as a 2nd endpoint (fp16 KV / auto;
#                     fp8 is unusable on Ampere -- see runpod-a40-fp8-kv-ampere). 6 slots.
#
# 18 + 6 = 24 episodes. The local host (32 cores / 125 GB) runs the harness containers
# only (inference is remote), and SFT is GPU-bound, so 24 harness sets fit with headroom.
# H100 capacity 18 is conservative vs its ~26 fp8 ceiling: raise runpod-h100-1.capacity +
# parallel_episodes together if host load stays low and the H100 /metrics show preempt ~0.
#
# Run (generation-only, same entrypoint as the live run):
#   source ~/.config/nsl-runpod/secrets.env          # RUNPOD_VLLM_KEY for the pool
#   nix develop -c uv run python scripts/run_generation_only.py \
#     config/config-feature-hypothesis-kazakhstan-external.toml

model_name = "vllm:QuantTrio/gemma-4-31B-it-AWQ"
gpu_memory_utilization = 0.90
code_host_cache_path = "./code/feature-hypothesis-kazakhstan/code/"
container_ids = [
  "feature-hypothesis-kazakhstan-compose-agent-1",
  "feature-hypothesis-kazakhstan-compose-vfm-1",
  "feature-hypothesis-kazakhstan-compose-analysis-1",
]
main_container_idx = 0
dynamic_container = true
docker_compose_dir = "./docker/feature-hypothesis-kazakhstan-compose"
train_data_save_folder = "./data/kazakhstan/feature-hypothesis/train_data"

[inference]
timeout = 300

[vllm]
# endpoints-mode: NO local container is launched. Capacity-floor abort fires only if
# healthy capacity drops below this. 4 => survive on either pod alone (H100 18 >= 4,
# A40 6 >= 4); abort only if BOTH collapse. Deliberately low (a floor set too high vs
# capacity caused a spurious capacity-floor abort before -- see endpoint-timeout-not-outage).
min_healthy_endpoint_capacity = 4

[[vllm.endpoints]]
id          = "runpod-h100-1"
base_url    = "http://216.81.245.97:19053"   # H100 PCIe pod dmf60ieqi9ffz1 (v0.20.2, fp8 KV)
capacity    = 32                              # bumped 18->32 (KV was ~23% @ 18, 0 preempt). ~26 fp8 KV slots est. was conservative; 80GB has room. Tune from /metrics preemptions.
api_key_env = "RUNPOD_VLLM_KEY"               # pod injects VLLM_API_KEY; bearer confirmed serving

[[vllm.endpoints]]
id          = "runpod-a40-1"
base_url    = "http://194.68.245.114:22043"   # A40 pod 571sc1lvcopuy6 (v0.20.2, --kv-cache-dtype auto/fp16)
capacity    = 6                               # A40 fp16 KV: ~129K tokens (num_gpu_blocks=8064) => 6 @ ~21K ctx
api_key_env = "RUNPOD_VLLM_KEY"

[task]
class = "tasks.feature_hypothesis_kazakhstan.FeatureHypothesisKazakhstanTask"

[task.config]
docker_compose_dir = "./docker/feature-hypothesis-kazakhstan-compose"
dataset_dir = "../Kazkhstan_data"
store_dir = "./data/kazakhstan/feature-hypothesis/store"
kg_dir = "./data/kazakhstan/feature-hypothesis/knowledge"
variation_names = ["teniz_basin"]

[harness]
name = "container"

[harness.container]
profile = "aiq"
image = "nsl/aiq:0.1.0"
max_wall_seconds = 7200
mem_limit = "2g"
network_mode = "host"
inference_transport = "tcp"
# Tool-output truncation cap (chars) read by the capability bridge
# (src/framework/capability_bridge.py:406, key on config.harness.container). Tightened
# below the 4000 default to curb per-turn context growth on long flailing episodes that
# balloon to the 65536 ceiling; full output stays available via artifact paths. Pair with
# a lower AIQ iteration cap so flailing episodes terminate before context overflow.
tool_output_max_chars = 2500

[harness.container.build]
context = "docker/aiq"
build_args = {}

[harness.container.profile_config]
model = "nsl-feature-hypothesis-kazakhstan"
agent_type = "tool_calling_agent"
max_iterations = 28
tool_call_timeout_s = 600
function_group_name = "capabilities"
force_tool_choice = true

[generation]
variation_strategy = "round_robin"
generation_timeout_s = 172800  # 48 hrs
max_consecutive_verification_failures = 2
container_rebuild_interval = 10
# 32 H100 + 6 A40 = 38 slots. Capacity-weighted home map: 32/38 to runpod-h100-1,
# 6/38 to runpod-a40-1. Host runs only the harness containers (inference is remote) and
# SFT is GPU-bound, so 38 harness sets (~114 containers) fit on 32 cores / 125 GB. Raise the
# H100 capacity + parallel_episodes together if host load stays low and H100 preempt ~0.
parallel_episodes = 38
target_training_rows = 4500
max_episodes = 10000
max_bootstrap_episodes = 20
checkpoint_every_episode = true
# Resume the existing generation_0 checkpoint if present (endpoints are infra, not part
# of the recipe hash, so swapping local->H100 should not trip the resume guard); only
# resumes THIS run if interrupted.
resume_from_checkpoint = true
generation_output_dir = "./data/kazakhstan/feature-hypothesis/generations"

[training]
# Inert under num_generations=1 (generation-only; no finetune in this run). The real SFT
# is the separate standalone qlora run on the pooled dataset.
base_model = "unsloth/gemma-4-31B-it-unsloth-bnb-4bit"
max_steps = 100
per_device_train_batch_size = 1
gradient_accumulation_steps = 1
learning_rate = 2e-4
warmup_steps = 2
max_seq_length = 2048
adapter_output_dir = "./models/adapters/feature-hypothesis-kazakhstan"
wandb_project = "feature-hypothesis-kazakhstan"
gpu_wait_min_free_memory_fraction = 0.7

[orchestration]
# Generation-only (no finetuning), same as the live run.
num_generations = 1
training_window_size = 3

[observability]
enabled = true
record_inference = true
record_phases = true
record_resources = true
load_tags = ["feature-hypothesis", "kazakhstan-teniz-basin", "regional-analysis", "bic-scoring", "gemma4", "dedup-gate", "bootstrap-ramp", "external-only", "runpod-h100", "runpod-a40"]
