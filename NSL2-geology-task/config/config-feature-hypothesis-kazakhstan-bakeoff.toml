# BAKE-OFF: measure one L40S's real concurrent-episode cap; target 16 simultaneous episodes on a single external endpoint.
#
# RunPod-ONLY inference (no local box), isolated scratch store/KG so it never
# touches the production run the user is about to kick off. Provision the pod
# first (scripts/provision_runpod_vllm.py up), paste its base_url below, then:
#
#   source ~/.config/nsl-runpod/secrets.env      # RUNPOD_VLLM_KEY for the pool
#   nix develop -c uv run python scripts/run_episode.py \
#     config/config-feature-hypothesis-kazakhstan-bakeoff.toml
#
# In a second shell, watch the L40S the whole time:
#   uv run python scripts/inspect/vllm_live_metrics.py \
#     --url http://<POD_IP>:<PORT>/metrics --window 60 --count 0 --jsonl /tmp/bakeoff_l40s.jsonl
#
# VERDICT: 16 fits this card iff, in steady state (post-bootstrap, ~16 running),
#   preempt ~= 0 AND pfx_hit climbs high. If preempt climbs before 16 -> the card
#   caps lower; reach 16 external by adding a second L40S endpoint instead.
# NOTE: a fresh KG starts in bootstrap at concurrency cap 4 (task default), so
#   either seed the scratch KG from production to hit 16 immediately, or run >40
#   episodes and read only post-bootstrap windows where concurrency reached target.

model_name = "vllm:QuantTrio/gemma-4-31B-it-AWQ"
gpu_memory_utilization = 0.90
code_host_cache_path = "./code/feature-hypothesis-kazakhstan/code/"
container_ids = [
  "feature-hypothesis-kazakhstan-compose-agent-1",
  "feature-hypothesis-kazakhstan-compose-vfm-1",
  "feature-hypothesis-kazakhstan-compose-analysis-1",
]
main_container_idx = 0
dynamic_container = true
docker_compose_dir = "./docker/feature-hypothesis-kazakhstan-compose"
train_data_save_folder = "./data/kazakhstan-bakeoff/feature-hypothesis/train_data"

[inference]
timeout = 300

[vllm]
# endpoints-mode: the framework launches NO local container; it only connects to
# the URLs below and probes them. The engine flags (max_model_len, kv parser,
# etc.) live in the pod's `vllm serve` args, NOT here.
min_healthy_endpoint_capacity = 1

[[vllm.endpoints]]
id = "runpod-l40s-1"
base_url = "http://REPLACE_WITH_POD_IP:PORT"   # <-- paste from `provision_runpod_vllm.py up`
capacity = 16
api_key_env = "RUNPOD_VLLM_KEY"

[task]
class = "tasks.feature_hypothesis_kazakhstan.FeatureHypothesisKazakhstanTask"

[task.config]
docker_compose_dir = "./docker/feature-hypothesis-kazakhstan-compose"
dataset_dir = "../Kazkhstan_data"
store_dir = "./data/kazakhstan-bakeoff/feature-hypothesis/store"
kg_dir = "./data/kazakhstan-bakeoff/feature-hypothesis/knowledge"
variation_names = ["teniz_basin"]

[harness]
name = "container"

[harness.container]
profile = "aiq"
image = "nsl/aiq:0.1.0"
max_wall_seconds = 7200
mem_limit = "2g"
network_mode = "host"
inference_transport = "tcp"
context_compaction_enabled = true
context_compaction_trigger_tokens = 52000
context_compaction_target_tokens = 45000
context_compaction_keep_recent_tool_outputs = 3
context_compaction_keep_recent_assistant_reasoning = 3

[harness.container.build]
context = "docker/aiq"
build_args = {}

[harness.container.profile_config]
model = "nsl-feature-hypothesis-kazakhstan"
agent_type = "tool_calling_agent"
max_iterations = 40
tool_call_timeout_s = 600
function_group_name = "capabilities"
force_tool_choice = true

[generation]
variation_strategy = "round_robin"
generation_timeout_s = 5400          # 90 min — enough to reach + hold steady state
max_consecutive_verification_failures = 2
container_rebuild_interval = 10
parallel_episodes = 16               # the cap under test
target_training_rows = 100000        # high so rows don't stop the bake-off early
max_episodes = 120                   # ~enough to clear bootstrap and measure 16-wide
max_bootstrap_episodes = 20
checkpoint_every_episode = true
resume_from_checkpoint = false       # fresh scratch run
generation_output_dir = "./data/kazakhstan-bakeoff/feature-hypothesis/generations"

[training]
base_model = "unsloth/gemma-4-31B-it-unsloth-bnb-4bit"
max_steps = 100
per_device_train_batch_size = 1
gradient_accumulation_steps = 1
learning_rate = 2e-4
warmup_steps = 2
max_seq_length = 2048
adapter_output_dir = "./models/adapters/feature-hypothesis-kazakhstan-bakeoff"
wandb_project = "feature-hypothesis-kazakhstan-bakeoff"
gpu_wait_min_free_memory_fraction = 0.7

[orchestration]
num_generations = 1                  # generation-only; no finetune

[observability]
enabled = true
record_inference = true
record_phases = true
record_resources = true
load_tags = ["feature-hypothesis", "kazakhstan-teniz-basin", "bakeoff", "l40s", "runpod", "gemma4"]
