# config-memory-cleanup-aiq.toml - drives memory_cleanup through the
# Dockerized NVIDIA NeMo Agent Toolkit harness.
model_name = "vllm:Qwen/Qwen2.5-Coder-7B-Instruct-AWQ"
code_host_cache_path = "./code/memory-cleanup-aiq/code/"
container_ids = ["special-learn-compose_service-a_1"]
main_container_idx = 0
dynamic_container = true
docker_compose_dir = "./docker/special-learn-compose"
train_data_save_folder = "./data/memory-cleanup-aiq/train_data"

[vllm]
max_model_len = 32000
max_num_seqs = 16
enable_chunked_prefill = true
enable_prefix_caching = true
chat_template_path = "config/chat_templates/qwen2.5-instruct.jinja"
enable_auto_tool_choice = true
tool_call_parser = "hermes"

[task]
class = "tasks.memory_cleanup.MemoryCleanupTask"

[harness]
name = "container"

[harness.container]
profile = "aiq"
image = "nsl/aiq:0.1.0"
max_wall_seconds = 3600
mem_limit = "2g"
network_mode = "host"
inference_transport = "tcp"

[harness.container.build]
context = "docker/aiq"
build_args = {}

[harness.container.profile_config]
model = "nsl-memory-cleanup"
agent_type = "tool_calling_agent"
max_iterations = 12
tool_call_timeout_s = 90
function_group_name = "capabilities"
force_tool_choice = true

[generation]
variation_strategy = "round_robin"
generation_timeout_s = 21600
max_consecutive_verification_failures = 8
container_rebuild_interval = 10
parallel_episodes = 12
target_training_rows = 2000
max_episodes = 1000
checkpoint_every_episode = true
resume_from_checkpoint = true
generation_output_dir = "./data/memory-cleanup-aiq/generations"

[training]
base_model = "unsloth/Qwen2.5-Coder-7B-Instruct-bnb-4bit"
max_steps = 100
per_device_train_batch_size = 1
gradient_accumulation_steps = 1
learning_rate = 2e-4
warmup_steps = 2
max_seq_length = 4096
adapter_output_dir = "./models/adapters/memory-cleanup-aiq"
gpu_wait_min_free_memory_fraction = 0.7

[orchestration]
num_generations = 5
training_window_size = 3

[observability]
enabled = true
record_inference = true
record_phases = true
record_resources = true
