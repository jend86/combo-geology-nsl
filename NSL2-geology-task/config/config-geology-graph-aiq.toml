# Geology graph-refinement task via the AIQ (NVIDIA NeMo Agent Toolkit) harness.
# Mirrors config-geology-graph-msagent.toml. Differs only in the harness block:
# AIQ profile instead of ms_agent, the nsl/aiq:0.1.0 image, and AIQ-shaped
# profile_config fields (agent_type, max_iterations, force_tool_choice,
# function_group_name).
#
# Why AIQ is being trialled: under ms_agent the geology task terminates each
# workflow step after a single assistant turn (the model emits one tool call,
# never closes the step with record_phase, and ms_agent's after_tool_call
# callback flips runtime.should_stop the moment the next assistant message has
# no tool_calls). AIQ's tool_calling_agent has its own iteration loop
# (max_iterations) and supports `tool_choice="required"` via force_tool_choice,
# which can compel a tool call on every turn — preventing the silent
# single-turn collapse seen in run 20260515-8fuepq.
#
# Known risk from run 20260509-dhjjal: Qwen2.5-Coder-7B-Instruct-AWQ has been
# observed to emit
# markdown-fenced OpenAI-shape tool-call JSON under AIQ instead of Hermes
# <tool_call> tags, producing 0 tool calls / 1-turn episodes. force_tool_choice
# = true is our v1 mitigation; if dhjjal-style behaviour reappears here, the
# next move is either a per-model tool-call parser or a task-side terminator
# capability.

model_name = "vllm:Qwen/Qwen2.5-Coder-7B-Instruct-AWQ"
code_host_cache_path = "./code/geology-graph-aiq/code/"
container_ids = [
  "geology-graph-compose-agent-1",
  "geology-graph-compose-g2v-1",
  "geology-graph-compose-analysis-1",
]
main_container_idx = 0
dynamic_container = true
docker_compose_dir = "./docker/geology-graph-compose"
train_data_save_folder = "./data/geology-graph-aiq/train_data"

[vllm]
max_model_len = 32000
max_num_seqs = 12
enable_chunked_prefill = true
enable_prefix_caching = true
chat_template_path = "config/chat_templates/qwen2.5-instruct.jinja"
enable_auto_tool_choice = true
tool_call_parser = "hermes"

[task]
class = "tasks.geology_graph.GeologyGraphTask"

[task.config]
docker_compose_dir = "./docker/geology-graph-compose"
dataset_dir = "./data/geology/36572_smolianova_1984"
pool_root = "./data/geology-graph-aiq/pools"
variation_names = ["smolianova_basic"]
t_steady = 60.0

[harness]
name = "container"

[harness.container]
profile = "aiq"
image = "nsl/aiq:0.1.0"
max_wall_seconds = 7200
mem_limit = "2g"
network_mode = "host"
inference_transport = "tcp"

[harness.container.build]
context = "docker/aiq"
build_args = {}

[harness.container.profile_config]
model = "nsl-geology-graph"
agent_type = "tool_calling_agent"
# Per-step iteration budget for NAT's tool_calling_agent. Doubled from the
# original 20 to give refine loops more room; the task-side per-step caps in
# geology_graph.py episode_constraints() are the real bottleneck and have been
# doubled in lockstep.
max_iterations = 40
tool_call_timeout_s = 360
function_group_name = "capabilities"
# Compels vLLM's structured-outputs backend to emit a tool call on every turn.
# Trade-off: it also prevents free-form "final answer" turns inside a step.
# The geology workflow doesn't need free-form answers — every step closes with
# a tool call (record_phase / seed_submit / report_metric) — so this is safe.
force_tool_choice = true

[generation]
variation_strategy = "round_robin"
generation_timeout_s = 14400
max_consecutive_verification_failures = 2
container_rebuild_interval = 10
parallel_episodes = 8
target_training_rows = 4
max_episodes = 20
max_bootstrap_episodes = 20
checkpoint_every_episode = true
resume_from_checkpoint = false
generation_output_dir = "./data/geology-graph-aiq/generations"

[training]
base_model = "unsloth/Qwen2.5-Coder-7B-Instruct-bnb-4bit"
max_steps = 20
per_device_train_batch_size = 1
gradient_accumulation_steps = 1
learning_rate = 2e-4
warmup_steps = 2
max_seq_length = 4096
adapter_output_dir = "./models/adapters/geology-graph-aiq"
wandb_project = "geology-prototype"
gpu_wait_min_free_memory_fraction = 0.7

[orchestration]
num_generations = 1
training_window_size = 1

[observability]
enabled = true
record_inference = true
record_phases = true
record_resources = true
load_tags = ["verification", "geology-graph", "bootstrap-smoke", "aiq"]
